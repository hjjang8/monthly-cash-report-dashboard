<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 자금보고</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#1F3A5F;
    --deep-navy:#16293F;
    --blue-gray:#7A9CC6;
    --amber:#D9A441;
    --bg:#F7F8FA;
    --card:#FFFFFF;
    --border:#E4E8EE;
    --income-text:#4A6FA5;
    --expense-text:#B07E1F;
    --text-main:#1C2733;
    --text-sub:#667485;
    --text-faint:#8493A3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text-main);
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:224px; flex-shrink:0;
    background:linear-gradient(180deg,#16293F 0%,#1F3A5F 100%);
    color:#fff;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .brand{padding:26px 20px 18px;}
  .eyebrow{font-size:10px; letter-spacing:1.6px; color:rgba(255,255,255,.55); font-weight:700;}
  .brand-title{font-size:17px; font-weight:700; margin-top:6px; letter-spacing:.2px;}
  .nav{flex:1; padding:10px 0; overflow-y:auto;}
  .nav-group-label{font-size:11px; color:rgba(255,255,255,.42); padding:18px 20px 6px; letter-spacing:.4px;}
  .nav-item{
    display:block; width:100%; text-align:left; background:none; border:none;
    color:rgba(255,255,255,.78); padding:12px 20px; font-size:14px; cursor:pointer;
    border-left:3px solid transparent; font-family:inherit;
  }
  .nav-item.sub{padding-left:32px; font-size:13.5px;}
  .nav-item:hover{color:#fff; background:rgba(255,255,255,.06);}
  .nav-item.active{color:#fff; font-weight:700; border-left-color:var(--amber); background:rgba(255,255,255,.09);}
  .sidebar-footer{
    padding:18px 20px 22px;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .footer-logo{display:block; width:112px; max-width:100%; height:auto;}

  /* Content */
  .content{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    background:#fff; border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  .page-title{font-size:18px; font-weight:700; color:var(--deep-navy);}
  .as-of{font-size:13px; color:var(--text-sub);}
  .main{padding:24px 28px 8px; flex:1;}
  .page[hidden]{display:none;}

  /* KPI */
  .kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px;}
  .kpi-card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px 20px;}
  .kpi-card.end-balance{border-top:3px solid var(--navy);}
  .kpi-label{font-size:13px; color:var(--text-sub); margin-bottom:10px;}
  .kpi-value{font-size:22px; font-weight:700; color:var(--deep-navy);}
  .kpi-value .unit{font-size:12px; font-weight:500; color:var(--text-faint); margin-left:3px;}
  .kpi-sub{margin-top:8px; font-size:12px; color:var(--text-faint);}

  /* Cards */
  .card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px;}
  .card-title{font-size:14px; font-weight:700; color:var(--deep-navy); margin-bottom:14px;}
  .chart-wrap{position:relative; height:280px;}

  /* Summary tables */
  .summary-card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  .summary-card-head-left{display:flex; align-items:center; gap:10px;}
  .summary-card-head .card-title{margin:0;}
  .year-badge{font-size:12px; background:var(--navy); color:#fff; padding:3px 11px; border-radius:20px; font-weight:600;}
  .table-unit{font-size:12px; color:var(--text-faint);}
  .table-scroll{overflow-x:auto; border:1px solid var(--border); border-radius:8px;}
  table.summary-table{border-collapse:separate; border-spacing:0; width:100%; min-width:960px; font-size:13px;}
  .summary-table th, .summary-table td{padding:9px 10px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; background:#fff;}
  .summary-table thead th{background:#F0F3F7; color:var(--deep-navy); font-weight:700; text-align:center; border-bottom:1px solid var(--border);}
  .summary-table td.label, .summary-table th.label{text-align:left;}
  .summary-table td.total-col, .summary-table th.total-col{background:#EEF2F7;}
  .summary-table .sticky1{position:sticky; left:0; z-index:2; width:56px; min-width:56px; text-align:center; font-weight:700; color:var(--deep-navy); vertical-align:middle;}
  .summary-table .sticky2{position:sticky; left:56px; z-index:2; width:118px; min-width:118px; box-shadow:6px 0 6px -6px rgba(20,30,45,.28);}
  .summary-table thead th.sticky1, .summary-table thead th.sticky2{z-index:3;}
  .summary-table thead th.sticky1{background:#F0F3F7;}
  .summary-table thead th.sticky2{background:#F0F3F7;}

  .summary-table tbody tr.row-base td{background:#EEF3F9;}
  .summary-table tbody tr.row-end td{background:#EEF3F9; border-top:2px solid var(--navy);}
  .summary-table tbody tr.row-subtotal td{font-weight:700; border-bottom:2px solid #C9D3E0;}
  .summary-table tbody tr.row-net td{color:var(--navy); font-weight:700;}
  .summary-table .num-income{color:var(--income-text);}
  .summary-table .num-expense{color:var(--expense-text);}

  /* Detail table */
  .detail-controls{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  .detail-controls label{font-size:13px; color:var(--text-sub);}
  #monthSelect{padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; background:#fff; color:var(--text-main);}
  table.detail-table{width:100%; border-collapse:collapse; font-size:13px; min-width:620px;}
  .detail-table thead th{background:#F0F3F7; padding:10px; text-align:right; font-weight:700; color:var(--deep-navy); border-bottom:1px solid var(--border);}
  .detail-table thead th.label{text-align:left;}
  .detail-table td{padding:9px 10px; border-bottom:1px solid var(--border); text-align:right;}
  .detail-table td.label{text-align:left;}
  .detail-table tr.detail-subtotal td{font-weight:700; background:#F5F7FA; border-top:1px solid #C9D3E0; border-bottom:2px solid #C9D3E0;}
  .warn-text{margin-top:12px; font-size:12px; color:var(--text-faint);}

  /* Footer */
  .footer{padding:18px 28px 26px; font-size:12px; color:var(--text-faint); text-align:center;}

  /* Error state */
  .load-error{text-align:center; color:var(--text-sub); padding:70px 20px; font-size:14px;}

  @media (max-width:900px){
    .app{flex-direction:column;}
    .sidebar{width:100%; height:auto; position:sticky; top:0; z-index:20; flex-direction:row; align-items:center;}
    .brand{padding:10px 14px; flex-shrink:0;}
    .nav{display:flex; flex:1; padding:0; overflow-x:auto; overflow-y:hidden;}
    .nav-group-label{display:none;}
    .nav-item{border-left:none; border-bottom:3px solid transparent; padding:14px 12px; white-space:nowrap;}
    .nav-item.active{border-bottom-color:var(--amber); border-left-color:transparent;}
    .sidebar-footer{display:none;}
    .topbar{padding:12px 16px;}
    .main{padding:16px 16px 4px;}
    .kpi-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
    .kpi-card{padding:14px 14px;}
    .chart-wrap{height:200px;}
  }
</style>
</head>

            <div class="kpi-sub" id="kpiEndSub">-</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">월별 현금잔액 추이</div>
          <div class="chart-wrap"><canvas id="balanceChart"></canvas></div>
        </div>

        <div class="card">
          <div class="card-title">월별 수입 · 지출 비교</div>
          <div class="chart-wrap"><canvas id="ioChart"></canvas></div>
        </div>
      </div>

      <div id="page-summary" class="page" hidden>
        <div id="summaryTables"></div>
      </div>

      <div id="page-detail" class="page" hidden>
        <div class="card">
          <div class="detail-controls">
            <label for="monthSelect">조회 월</label>
            <select id="monthSelect"></select>
          </div>
          <div class="table-scroll">
            <table class="detail-table" id="detailTable">
              <thead>
                <tr>
                  <th class="label">구분</th>
                  <th class="label">항목</th>
                  <th>금액</th>
                  <th>비중</th>
                  <th>전월 대비</th>
                </tr>
              </thead>
              <tbody id="detailTbody"></tbody>
            </table>
          </div>
          <div class="warn-text" id="detailWarn" hidden></div>
        </div>
      </div>
    </main>

    <footer class="footer">
      본 보고서는 구글 스프레드시트 데이터와 실시간 연동됩니다. &middot; 경영총괄부
    </footer>
  </div>
</div>

<script>
(function(){
  "use strict";

  var SUMMARY_URL = "https://docs.google.com/spreadsheets/d/1dAvuc4xukEkAT_p7Seo6-yCaXKZY0fa4Ls9n3h14RIQ/edit?gid=0#gid=0";
  var DETAIL_URL  = "https://docs.google.com/spreadsheets/d/1dAvuc4xukEkAT_p7Seo6-yCaXKZY0fa4Ls9n3h14RIQ/edit?gid=2000332474#gid=2000332474";

  var state = { summary: [], detail: [] };
  var charts = { balance: null, io: null };

  /* ---------------- URL / fetch helpers ---------------- */

  function toCsvUrl(editUrl){
    var idMatch = editUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
    var gidMatch = editUrl.match(/gid=(\d+)/);
    var id = idMatch ? idMatch[1] : "";
    var gid = gidMatch ? gidMatch[1] : "0";
    return "https://docs.google.com/spreadsheets/d/" + id + "/gviz/tq?tqx=out:csv&gid=" + gid;
  }

  /* ---------------- CSV parser (no external libs) ---------------- */

  function parseCSV(text){
    var rows = [];
    var row = [];
    var field = "";
    var inQuotes = false;
    for (var i = 0; i < text.length; i++){
      var c = text[i];
      if (inQuotes){
        if (c === '"'){
          if (text[i+1] === '"'){ field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else {
        if (c === '"'){ inQuotes = true; }
        else if (c === ','){ row.push(field); field = ""; }
        else if (c === '\r'){ /* skip */ }
        else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
        else { field += c; }
      }
    }
    if (field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
    return rows;
  }

  function parseAmount(v){
    if (v === null || v === undefined) return 0;
    var cleaned = String(v).replace(/[",\s]/g, "");
    if (cleaned === "" || cleaned === "-") return 0;
    var n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  }

  function normalizeMonth(raw){
    if (!raw) return null;
    var m = String(raw).match(/(\d{4})\D{0,2}(\d{1,2})/);
    if (!m) return null;
    var year = m[1];
    var month = parseInt(m[2], 10);
    if (month < 1 || month > 12) return null;
    return year + "-" + String(month).padStart(2, "0");
  }

  /* ---------------- Data building ---------------- */

  function buildSummary(rows){
    var out = [];
    for (var i = 1; i < rows.length; i++){
      var row = rows[i];
      if (!row || row.length === 0) continue;
      var month = normalizeMonth(row[0]);
      if (!month) continue;
      var rec = {
        month: month,
        base: parseAmount(row[1]),
        incomeOp: parseAmount(row[2]),
        incomeFin: parseAmount(row[3]),
        incomeEtc: parseAmount(row[4]),
        expInv: parseAmount(row[5]),
        expFin: parseAmount(row[6]),
        expOpCost: parseAmount(row[7]),
        adjust: parseAmount(row[8])
      };
      out.push(rec);
    }
    out.sort(function(a,b){ return a.month < b.month ? -1 : (a.month > b.month ? 1 : 0); });
    out.forEach(function(r){
      r.incomeTotal = r.incomeOp + r.incomeFin + r.incomeEtc;
      r.expenseTotal = r.expInv + r.expFin + r.expOpCost;
      r.netFlow = r.incomeTotal - r.expenseTotal + r.adjust;
      r.endBalance = r.base + r.netFlow;
    });
    return out;
  }

  function buildDetail(rows){
    var out = [];
    for (var i = 1; i < rows.length; i++){
      var row = rows[i];
      if (!row || row.length === 0) continue;
      var month = normalizeMonth(row[0]);
      if (!month) continue;
      var type = (row[1] || "").trim();
      var item = (row[2] || "").trim();
      if (!type || !item) continue;
      out.push({ month: month, type: type, item: item, amount: parseAmount(row[3]) });
    }
    out.sort(function(a,b){ return a.month < b.month ? -1 : (a.month > b.month ? 1 : 0); });
    return out;
  }

  /* ---------------- Formatting helpers ---------------- */

  function round1(n){ return Math.round(n * 10) / 10; }

  function fmtEokPlain(won){
    var eok = won / 1e8;
    return eok.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  }

  function fmtEokMainHtml(won){
    return fmtEokPlain(won) + '<span class="unit">억원</span>';
  }

  function fmtSignedEok(won){
    var eok = round1(won / 1e8);
    var sign = eok > 0 ? "+" : (eok < 0 ? "-" : "");
    var absStr = Math.abs(eok).toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    return sign + absStr + "억원";
  }

  function formatMonthLabel(month){
    var parts = month.split("-");
    return parts[0].slice(2) + "." + parts[1];
  }

  function formatMonthFull(month){
    var parts = month.split("-");
    return parts[0] + "년 " + parseInt(parts[1], 10) + "월";
  }

  function formatAsOfDate(month){
    var parts = month.split("-").map(Number);
    var y = parts[0], m = parts[1];
    var lastDay = new Date(y, m, 0).getDate();
    return y + ". " + String(m).padStart(2,"0") + ". " + String(lastDay).padStart(2,"0");
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  /* ---------------- Nav / page switching ---------------- */

  function switchPage(page){
    document.querySelectorAll(".page").forEach(function(p){ p.hidden = (p.id !== "page-" + page); });
    document.querySelectorAll(".nav-item[data-page]").forEach(function(b){
      b.classList.toggle("active", b.dataset.page === page);
    });
    var titles = { dashboard: "대시보드", summary: "월별자금내역 - 요약", detail: "월별자금내역 - 상세" };
    document.getElementById("pageTitle").textContent = titles[page];
    window.scrollTo(0, 0);
    var main = document.getElementById("main");
    if (main) main.scrollTop = 0;
  }

  document.querySelectorAll(".nav-item[data-page]").forEach(function(btn){
    btn.addEventListener("click", function(){ switchPage(btn.dataset.page); });
  });

  /* ---------------- Dashboard ---------------- */

  function chartBaseOptions(showLegend){
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: !!showLegend,
          position: "top",
          align: "end",
          labels: { usePointStyle: true, pointStyle: "circle", boxWidth: 8, boxHeight: 8, color: "#4B5768", font: { size: 12 } }
        },
        tooltip: {
          backgroundColor: "#16293F",
          cornerRadius: 8,
          padding: 10,
          titleFont: { size: 12 },
          bodyFont: { size: 12.5 },
          callbacks: {
            label: function(ctx){
              var v = ctx.parsed.y.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
              return ctx.dataset.label + ": " + v + "억원";
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: "#7C8898", font: { size: 11.5 } } },
        y: { grid: { color: "#EEF1F5" }, ticks: { color: "#7C8898", font: { size: 11.5 }, callback: function(v){ return v + "억"; } } }
      }
    };
  }

  function renderLineChart(data){
    var ctx = document.getElementById("balanceChart").getContext("2d");
    var labels = data.map(function(d){ return formatMonthLabel(d.month); });
    var values = data.map(function(d){ return round1(d.endBalance / 1e8); });
    if (charts.balance) charts.balance.destroy();
    charts.balance = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "기말잔액",
          data: values,
          borderColor: "#1F3A5F",
          borderWidth: 2.5,
          tension: 0.35,
          fill: true,
          backgroundColor: function(context){
            var chart = context.chart;
            var chartArea = chart.chartArea;
            if (!chartArea) return "rgba(31,58,95,0.08)";
            var g = chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            g.addColorStop(0, "rgba(31,58,95,0.32)");
            g.addColorStop(1, "rgba(31,58,95,0.02)");
            return g;
          },
          pointBackgroundColor: "#fff",
          pointBorderColor: "#1F3A5F",
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 5
        }]
      },
      options: chartBaseOptions(false)
    });
  }

  function renderBarChart(data){
    var ctx = document.getElementById("ioChart").getContext("2d");
    var labels = data.map(function(d){ return formatMonthLabel(d.month); });
    var income = data.map(function(d){ return round1(d.incomeTotal / 1e8); });
    var expense = data.map(function(d){ return round1(d.expenseTotal / 1e8); });
    if (charts.io) charts.io.destroy();
    charts.io = new Chart(ctx, {
      type: "bar",
      data: {
        labels: labels,
        datasets: [
          { label: "수입", data: income, backgroundColor: "#7A9CC6", borderRadius: 5, maxBarThickness: 28 },
          { label: "지출", data: expense, backgroundColor: "#D9A441", borderRadius: 5, maxBarThickness: 28 }
        ]
      },
      options: chartBaseOptions(true)
    });
  }

  function renderDashboard(){
    var arr = state.summary;
    var latest = arr[arr.length - 1];
    var prev = arr.length > 1 ? arr[arr.length - 2] : null;

    document.getElementById("kpiBase").innerHTML = fmtEokMainHtml(latest.base);
    document.getElementById("kpiIncome").innerHTML = fmtEokMainHtml(latest.incomeTotal);
    document.getElementById("kpiExpense").innerHTML = fmtEokMainHtml(latest.expenseTotal);
    document.getElementById("kpiEnd").innerHTML = fmtEokMainHtml(latest.endBalance);

    document.getElementById("kpiIncomeSub").textContent = prev ? ("전월 대비 " + fmtSignedEok(latest.incomeTotal - prev.incomeTotal)) : "-";
    document.getElementById("kpiExpenseSub").textContent = prev ? ("전월 대비 " + fmtSignedEok(latest.expenseTotal - prev.expenseTotal)) : "-";
    document.getElementById("kpiEndSub").textContent = "기초 대비 " + fmtSignedEok(latest.endBalance - latest.base);

    var last6 = arr.slice(-6);
    renderLineChart(last6);
    renderBarChart(last6);
  }

  /* ---------------- Summary page (page 2) ---------------- */

  function monthCells(monthMap, field, numClass, noTotal){
    var cells = "";
    var sum = 0;
    var any = false;
    for (var m = 1; m <= 12; m++){
      var key = String(m).padStart(2, "0");
      var rec = monthMap[key];
      if (rec){
        var val = rec[field];
        cells += '<td class="' + (numClass || "") + '">' + fmtEokPlain(val) + "</td>";
        sum += val;
        any = true;
      } else {
        cells += "<td>-</td>";
      }
    }
    var totalCell = noTotal ? '<td class="total-col">-</td>' : ('<td class="total-col">' + (any ? fmtEokPlain(sum) : "-") + "</td>");
    return cells + totalCell;
  }

  function buildSummaryHead(){
    var thead = document.createElement("thead");
    var tr = document.createElement("tr");
    var monthsTh = "";
    for (var m = 1; m <= 12; m++){ monthsTh += "<th>" + m + "월</th>"; }
    tr.innerHTML = '<th class="sticky1 label">구분</th><th class="sticky2 label">항목</th>' + monthsTh + '<th class="total-col">누계</th>';
    thead.appendChild(tr);
    return thead;
  }

  function buildSummaryBody(monthMap){
    var tbody = document.createElement("tbody");
    var html = "";

    html += '<tr class="row-base"><td class="sticky1"></td><td class="sticky2 label">기초잔액</td>' + monthCells(monthMap, "base", "", true) + "</tr>";

    html += '<tr class="row-item"><td class="sticky1" rowspan="4">수입</td><td class="sticky2 label">영업</td>' + monthCells(monthMap, "incomeOp", "num-income") + "</tr>";
    html += '<tr class="row-item"><td class="sticky2 label">재무</td>' + monthCells(monthMap, "incomeFin", "num-income") + "</tr>";
    html += '<tr class="row-item"><td class="sticky2 label">기타</td>' + monthCells(monthMap, "incomeEtc", "num-income") + "</tr>";
    html += '<tr class="row-subtotal"><td class="sticky2 label">수입 계</td>' + monthCells(monthMap, "incomeTotal", "num-income") + "</tr>";

    html += '<tr class="row-item"><td class="sticky1" rowspan="4">지출</td><td class="sticky2 label">투자</td>' + monthCells(monthMap, "expInv", "num-expense") + "</tr>";
    html += '<tr class="row-item"><td class="sticky2 label">재무</td>' + monthCells(monthMap, "expFin", "num-expense") + "</tr>";
    html += '<tr class="row-item"><td class="sticky2 label">영업비용</td>' + monthCells(monthMap, "expOpCost", "num-expense") + "</tr>";
    html += '<tr class="row-subtotal"><td class="sticky2 label">지출 계</td>' + monthCells(monthMap, "expenseTotal", "num-expense") + "</tr>";

    html += '<tr class="row-adjust"><td class="sticky1"></td><td class="sticky2 label">조정</td>' + monthCells(monthMap, "adjust", "") + "</tr>";
    html += '<tr class="row-net"><td class="sticky1"></td><td class="sticky2 label">순유입/유출</td>' + monthCells(monthMap, "netFlow", "") + "</tr>";
    html += '<tr class="row-end"><td class="sticky1"></td><td class="sticky2 label">기말잔액</td>' + monthCells(monthMap, "endBalance", "", true) + "</tr>";

    tbody.innerHTML = html;
    return tbody;
  }

  function buildYearCard(year, isCurrent){
    var card = document.createElement("div");
    card.className = "card summary-year-card";

    var head = document.createElement("div");
    head.className = "summary-card-head";
    head.innerHTML = '<div class="summary-card-head-left"><div class="card-title">월별자금내역 - 요약</div><span class="year-badge">' + year + "년" + (isCurrent ? " · 진행 중" : "") + '</span></div><span class="table-unit">단위: 억원</span>';
    card.appendChild(head);

    var monthMap = {};
    state.summary.forEach(function(r){
      if (r.month.indexOf(year + "-") === 0) monthMap[r.month.slice(5, 7)] = r;
    });

    var scrollWrap = document.createElement("div");
    scrollWrap.className = "table-scroll";
    var table = document.createElement("table");
    table.className = "summary-table";
    table.appendChild(buildSummaryHead());
    table.appendChild(buildSummaryBody(monthMap));
    scrollWrap.appendChild(table);
    card.appendChild(scrollWrap);

    return card;
  }

  function renderSummaryPage(){
    var container = document.getElementById("summaryTables");
    container.innerHTML = "";
    var yearsAll = Array.from(new Set(state.summary.map(function(d){ return d.month.slice(0, 4); })));
    yearsAll.sort(function(a, b){ return b - a; });
    var years = yearsAll.slice(0, 2);
    var latestYear = state.summary[state.summary.length - 1].month.slice(0, 4);
    years.forEach(function(year){
      container.appendChild(buildYearCard(year, year === latestYear));
    });
  }

  /* ---------------- Detail page (page 3) ---------------- */

  function prevMonthOf(month){
    var parts = month.split("-").map(Number);
    var d = new Date(parts[0], parts[1] - 2, 1);
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
  }

  function rowsForDetail(list, total, prevItems){
    return list.map(function(d){
      var prevMatch = null;
      for (var i = 0; i < prevItems.length; i++){
        if (prevItems[i].type === d.type && prevItems[i].item === d.item){ prevMatch = prevItems[i]; break; }
      }
      var share = total !== 0 ? round1((d.amount / total) * 100) : null;
      var diff = prevMatch ? (d.amount - prevMatch.amount) : null;
      return '<tr>' +
        '<td class="label">' + escapeHtml(d.type) + "</td>" +
        '<td class="label">' + escapeHtml(d.item) + "</td>" +
        "<td>" + fmtEokPlain(d.amount) + "</td>" +
        "<td>" + (share === null ? "-" : share.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + "%") + "</td>" +
        "<td>" + (diff === null ? "-" : fmtSignedEok(diff)) + "</td>" +
        "</tr>";
    }).join("");
  }

  function renderDetailTable(month){
    var tbody = document.getElementById("detailTbody");
    var prevMonth = prevMonthOf(month);
    var items = state.detail.filter(function(d){ return d.month === month; });
    var prevItems = state.detail.filter(function(d){ return d.month === prevMonth; });

    var income = items.filter(function(d){ return d.type === "수입"; });
    var expense = items.filter(function(d){ return d.type === "지출"; });
    var incomeTotal = income.reduce(function(s, d){ return s + d.amount; }, 0);
    var expenseTotal = expense.reduce(function(s, d){ return s + d.amount; }, 0);

    var prevIncomeItems = prevItems.filter(function(d){ return d.type === "수입"; });
    var prevExpenseItems = prevItems.filter(function(d){ return d.type === "지출"; });
    var prevIncomeTotal = prevIncomeItems.reduce(function(s, d){ return s + d.amount; }, 0);
    var prevExpenseTotal = prevExpenseItems.reduce(function(s, d){ return s + d.amount; }, 0);

    var html = "";
    html += rowsForDetail(income, incomeTotal, prevItems);
    html += '<tr class="detail-subtotal"><td class="label">수입</td><td class="label">수입 계</td><td>' +
      fmtEokPlain(incomeTotal) + "</td><td>" + (income.length ? "100.0%" : "-") + "</td><td>" +
      (prevIncomeItems.length ? fmtSignedEok(incomeTotal - prevIncomeTotal) : "-") + "</td></tr>";

    html += rowsForDetail(expense, expenseTotal, prevItems);
    html += '<tr class="detail-subtotal"><td class="label">지출</td><td class="label">지출 계</td><td>' +
      fmtEokPlain(expenseTotal) + "</td><td>" + (expense.length ? "100.0%" : "-") + "</td><td>" +
      (prevExpenseItems.length ? fmtSignedEok(expenseTotal - prevExpenseTotal) : "-") + "</td></tr>";

    tbody.innerHTML = html;

    var warnEl = document.getElementById("detailWarn");
    var summaryRec = null;
    for (var i = 0; i < state.summary.length; i++){
      if (state.summary[i].month === month){ summaryRec = state.summary[i]; break; }
    }
    var msgs = [];
    if (summaryRec){
      var diffIncomeWon = summaryRec.incomeTotal - incomeTotal;
      var diffExpenseWon = summaryRec.expenseTotal - expenseTotal;
      if (round1(diffIncomeWon / 1e8) !== 0) msgs.push("요약 데이터(수입 계)와 " + fmtSignedEok(diffIncomeWon) + " 차이");
      if (round1(diffExpenseWon / 1e8) !== 0) msgs.push("요약 데이터(지출 계)와 " + fmtSignedEok(diffExpenseWon) + " 차이");
    }
    if (msgs.length){
      warnEl.hidden = false;
      warnEl.textContent = msgs.join(" / ");
    } else {
      warnEl.hidden = true;
    }
  }

  function initDetailPage(){
    var sel = document.getElementById("monthSelect");
    var months = state.summary.map(function(r){ return r.month; });
    var optsDesc = months.slice().sort().reverse();
    sel.innerHTML = optsDesc.map(function(m){ return '<option value="' + m + '">' + formatMonthFull(m) + "</option>"; }).join("");
    var latestMonth = months[months.length - 1];
    sel.value = latestMonth;
    sel.addEventListener("change", function(){ renderDetailTable(sel.value); });
    renderDetailTable(latestMonth);
  }

  /* ---------------- Init / error handling ---------------- */

  function showLoadError(){
    var main = document.getElementById("main");
    main.innerHTML = '<div class="load-error">데이터를 불러오지 못했습니다. 새로고침 해주세요.</div>';
    document.getElementById("asOfDate").textContent = "";
  }

  function initApp(){
    var latest = state.summary[state.summary.length - 1];
    document.getElementById("asOfDate").textContent = "기준일 " + formatAsOfDate(latest.month);
    renderDashboard();
    renderSummaryPage();
    initDetailPage();
    switchPage("dashboard");
  }

  function loadAll(){
    var summaryReq = fetch(toCsvUrl(SUMMARY_URL) + "&t=" + Date.now()).then(function(r){
      if (!r.ok) throw new Error("summary fetch failed");
      return r.text();
    });
    var detailReq = fetch(toCsvUrl(DETAIL_URL) + "&t=" + Date.now()).then(function(r){
      if (!r.ok) throw new Error("detail fetch failed");
      return r.text();
    });

    Promise.all([summaryReq, detailReq]).then(function(results){
      var summaryRows = parseCSV(results[0]);
      var detailRows = parseCSV(results[1]);
      state.summary = buildSummary(summaryRows);
      state.detail = buildDetail(detailRows);
      if (state.summary.length === 0) throw new Error("no summary data");
      initApp();
    }).catch(function(err){
      console.error(err);
      showLoadError();
    });
  }

  loadAll();
})();
</script>
</body>
</html>
