<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AROPET Cash Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --navy:#1F3A5F;
    --deep-navy:#16293F;
    --blue-gray:#7A9CC6;
    --amber:#D9A441;
    --bg:#F7F8FA;
    --card:#FFFFFF;
    --border:#E4E8EE;
    --income-text:#4A6FA5;
    --expense-text:#B07E1F;
    --text-main:#1C2733;
    --text-sub:#667485;
    --text-faint:#8493A3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text-main);
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:224px; flex-shrink:0;
    background:linear-gradient(180deg,#16293F 0%,#1F3A5F 100%);
    color:#fff;
    display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh;
  }
  .brand{padding:26px 20px 18px;}
  .eyebrow{font-size:10px; letter-spacing:1.6px; color:rgba(255,255,255,.55); font-weight:700;}
  .brand-title{font-size:17px; font-weight:700; margin-top:6px; letter-spacing:.2px;}
  .nav{flex:1; padding:10px 0; overflow-y:auto;}
  .nav-group-label{font-size:14px; color:rgba(255,255,255,.78); padding:12px 20px; letter-spacing:normal;}
  .nav-item{
    display:block; width:100%; text-align:left; background:none; border:none;
    color:rgba(255,255,255,.78); padding:12px 20px; font-size:14px; cursor:pointer;
    border-left:3px solid transparent; font-family:inherit;
  }
  .nav-item.sub{padding-left:32px; font-size:13.5px;}
  .nav-item:hover{color:#fff; background:rgba(255,255,255,.06);}
  .nav-item.active{color:#fff; font-weight:700; border-left-color:#ffffff; background:rgba(255,255,255,.16);}
  .sidebar-footer{
    padding:18px 20px 22px;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .footer-logo{display:block; width:160px; max-width:100%; height:auto;}

  /* Content */
  .content{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    background:#fff; border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  .page-title{font-size:18px; font-weight:700; color:var(--deep-navy);}
  .as-of{font-size:13px; color:var(--text-sub);}
  .main{padding:24px 28px 8px; flex:1;}
  .page[hidden]{display:none;}

  /* KPI */
  .kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px;}
  .kpi-card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px 20px;}
  .kpi-card.end-balance{border-top:3px solid var(--navy);}
  .kpi-card.current-balance{border-top:3px solid #C0392B;}
  .kpi-label{font-size:13px; color:var(--text-sub); margin-bottom:10px;}
  .kpi-value{font-size:22px; font-weight:700; color:var(--deep-navy);}
  .kpi-value .unit{font-size:12px; font-weight:500; color:var(--text-faint); margin-left:3px;}
  .kpi-sub{margin-top:8px; font-size:12px; color:var(--text-faint);}

  /* Cards */
  .card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px;}
  .card-title{font-size:14px; font-weight:700; color:var(--deep-navy); margin-bottom:14px;}
  .chart-wrap{position:relative; height:280px;}

  /* Summary tables */
  .summary-card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  .summary-card-head .card-title{margin:0;}
  .year-badge{font-size:12px; background:var(--navy); color:#fff; padding:3px 11px; border-radius:20px; font-weight:600;}
  .table-unit{font-size:12px; color:var(--text-faint);}
  .table-scroll{overflow-x:auto; border:1px solid var(--border); border-radius:8px;}
  table.summary-table{table-layout:fixed; border-collapse:separate; border-spacing:0; width:100%; min-width:976px; font-size:13px;}
  .summary-table th, .summary-table td{padding:9px 10px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:#fff;}
  .summary-table thead th{background:#F0F3F7; color:var(--deep-navy); font-weight:700; text-align:center; border-bottom:1px solid var(--border);}
  .summary-table td.label, .summary-table th.label{text-align:left;}
  .summary-table td.total-col, .summary-table th.total-col{background:#EEF2F7;}
  .summary-table .sticky1{position:sticky; left:0; z-index:2; width:56px; min-width:56px; text-align:left; font-weight:700; color:var(--deep-navy); vertical-align:middle;}
  .summary-table .sticky2{position:sticky; left:56px; z-index:2; width:140px; min-width:140px; box-shadow:6px 0 6px -6px rgba(20,30,45,.28);}
  .summary-table thead th.sticky1, .summary-table thead th.sticky2{z-index:3;}
  .summary-table thead th.sticky1{background:#F0F3F7;}
  .summary-table thead th.sticky2{background:#F0F3F7;}

  .summary-table tbody tr.row-base td{background:#EEF3F9;}
  .summary-table tbody tr.row-end td{background:#EEF3F9; border-top:2px solid var(--navy);}
  .summary-table tbody tr.row-subtotal td{font-weight:700; border-bottom:2px solid #C9D3E0;}
  .summary-table tbody tr.row-subtotal.income-total td{color:var(--income-text);}
  .summary-table tbody tr.row-subtotal.expense-total td{color:var(--expense-text);}
  .summary-table tbody tr.row-net td{color:var(--text-main); font-weight:700;}
  .summary-table .num-income{color:var(--income-text);}
  .summary-table .num-expense{color:var(--expense-text);}

  /* Detail table */
  .detail-controls{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .detail-controls-left{display:flex; align-items:center; gap:10px;}
  .detail-controls label{font-size:13px; color:var(--text-sub);}
  #monthSelect{padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; background:#fff; color:var(--text-main);}
  table.detail-table{width:100%; table-layout:fixed; border-collapse:separate; border-spacing:0; font-size:13px; min-width:814px;}
  .detail-table thead th{background:#F0F3F7; padding:10px; text-align:right; font-weight:700; color:var(--deep-navy); border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .detail-table thead th.label{text-align:left;}
  .detail-table td{padding:9px 10px; border-bottom:1px solid var(--border); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:#fff;}
  .detail-table td.label{text-align:left; white-space:normal;}
  .detail-table td.label.g1-strong{font-weight:700;}
  .detail-table tr.row-item td{background:#fff;}
  .detail-table tr.row-subtotal td{font-weight:700; background:#F5F7FA;}
  .detail-table tr.row-total td{font-weight:700; color:var(--navy); background:#F5F7FA; border-top:1px solid #C9D3E0; border-bottom:2px solid #C9D3E0;}
  .detail-table tr.row-total.expense-total td{color:var(--expense-text);}
  .detail-table tr.row-flat-base td, .detail-table tr.row-flat-end td{background:#EEF3F9;}
  .detail-table tr.row-flat-end td{border-top:2px solid var(--navy);}
  .detail-table .sticky1{position:sticky; left:0; z-index:2;}
  .detail-table .sticky2{position:sticky; left:56px; z-index:2;}
  .detail-table .sticky3{position:sticky; left:134px; z-index:2; box-shadow:6px 0 6px -6px rgba(20,30,45,.28);}
  .detail-table thead th.sticky1, .detail-table thead th.sticky2, .detail-table thead th.sticky3{z-index:3;}
  .detail-table .num-income{color:var(--income-text);}
  .detail-table .num-expense{color:var(--expense-text);}

  /* Footer */
  .footer{padding:18px 28px 26px; font-size:12px; color:var(--text-faint); text-align:center;}

  /* Error state */
  .load-error{text-align:center; color:var(--text-sub); padding:70px 20px; font-size:14px;}

  @media (max-width:900px){
    .app{flex-direction:column;}
    .sidebar{width:100%; height:auto; position:sticky; top:0; z-index:20; flex-direction:row; align-items:center;}
    .brand{padding:10px 14px; flex-shrink:0;}
    .nav{display:flex; flex:1; padding:0; overflow-x:auto; overflow-y:hidden;}
    .nav-group-label{display:none;}
    .nav-item{border-left:none; border-bottom:3px solid transparent; padding:14px 12px; white-space:nowrap; text-align:center;}
    .nav-item.sub{padding-left:12px;}
    .nav-item.active{border-bottom-color:#ffffff; border-left-color:transparent;}
    .sidebar-footer{display:none;}
    .topbar{padding:12px 16px;}
    .main{padding:16px 16px 4px;}
    .kpi-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
    .kpi-card{padding:14px 14px;}
    .chart-wrap{height:200px;}
  }

  /* Executive redesign */
  :root{--navy:#3559D9;--deep-navy:#151D36;--bg:#F3F5F9;--border:#E6EAF1;--income-text:#3559D9;--expense-text:#C65C45;--text-main:#172033;--text-sub:#667085;--text-faint:#98A2B3;--accent-soft:#EEF2FF;--coral-soft:#FFF1ED;--shadow:0 12px 32px rgba(24,34,56,.06)}
  body{font-family:Inter,Pretendard,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:radial-gradient(circle at 84% 2%,rgba(53,89,217,.07),transparent 25rem),var(--bg)}
  .sidebar{width:248px;background:radial-gradient(circle at 20% 5%,rgba(113,138,240,.2),transparent 17rem),linear-gradient(180deg,#151D36,#0E1427);border-right:1px solid rgba(255,255,255,.06);box-shadow:10px 0 40px rgba(20,28,52,.08)}
  .brand{display:flex;align-items:center;gap:12px;padding:28px 20px 24px}.brand-mark{width:40px;height:40px;display:grid;place-items:center;flex:0 0 40px;border-radius:13px;color:#fff;background:linear-gradient(145deg,#6E88F2,#3559D9);box-shadow:0 10px 24px rgba(53,89,217,.38)}.brand-mark svg{width:20px}.brand-copy{min-width:0}.eyebrow{font-size:9px;letter-spacing:1.45px}.brand-title{font-size:17px;margin-top:5px}
  .nav{padding:10px 12px}.nav-group-label{display:flex;align-items:center;justify-content:space-between;padding:22px 12px 8px;font-size:11px;color:rgba(255,255,255,.4)}.nav-group-label svg{width:13px}
  .nav-item,.nav-item.sub{display:flex;align-items:center;gap:11px;margin:3px 0;padding:11px 12px;border:0;border-radius:11px;color:rgba(255,255,255,.68);transition:.2s}.nav-item svg{width:18px;flex:none}.nav-item.sub{font-size:13px}.nav-item.sub svg{width:16px}.nav-item:hover{color:#fff;background:rgba(255,255,255,.07);transform:translateX(2px)}.nav-item.active{color:#fff!important;background:#263150!important;border:0;box-shadow:0 8px 20px rgba(5,10,24,.2),inset 0 1px 0 rgba(255,255,255,.08)}
  .content{background:transparent}.topbar{min-height:74px;padding:0 36px;background:rgba(255,255,255,.8);backdrop-filter:blur(16px)}.page-title{font-size:20px}.as-of{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid #E2E6EE;border-radius:10px;background:#fff;font-weight:650}.as-of:before{content:"";width:7px;height:7px;border-radius:50%;background:#2AAA7B;box-shadow:0 0 0 4px rgba(42,170,123,.1)}.main{padding:30px 36px 10px}
  .kpi-grid{gap:16px;margin-bottom:22px}.kpi-card{position:relative;overflow:hidden;padding:21px;border:1px solid rgba(225,229,237,.92);border-radius:18px;background:#fff;box-shadow:var(--shadow);transition:.2s}.kpi-card:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(24,34,56,.09)}.kpi-card::after{content:none!important;display:none!important}.kpi-card.end-balance,.kpi-card.current-balance{border-top:1px solid rgba(225,229,237,.92)}.kpi-card.end-balance:before,.kpi-card.current-balance:before{content:"";position:absolute;top:0;left:22px;right:22px;height:3px;background:#3559D9}.kpi-card.current-balance:before{background:#4B5563}.kpi-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:12px;font-weight:700}.kpi-icon{width:34px;height:34px;display:grid;place-items:center;border-radius:11px;background:var(--accent-soft);color:#3559D9}.kpi-icon.income{background:#EAF8F2;color:#1F8A68}.kpi-icon.expense{background:var(--coral-soft);color:#C65C45}.kpi-icon.current{background:#EEF0F3;color:#4B5563}.kpi-icon svg{width:17px}.kpi-value{font-size:26px;font-weight:760;letter-spacing:-.8px}.kpi-sub{margin-top:10px}
  .card{padding:23px 24px 20px;border:1px solid rgba(225,229,237,.92);border-radius:20px;box-shadow:var(--shadow)}.chart-kicker{margin:0 0 7px;font-size:9px;font-weight:750;letter-spacing:1.25px;color:#98A2B3}.card-title{display:flex;align-items:center;margin-bottom:20px;font-size:15px}.chart-wrap{height:300px}
  .table-scroll{border-radius:12px}.summary-table thead th,.detail-table thead th{background:#F6F7FA}.summary-table .sticky1,.summary-table .sticky2,.summary-table td.label,.summary-table th.label,.detail-table td.label,.detail-table th.label{text-align:center}.detail-table thead th,.detail-table thead th.label,.detail-table thead th.sticky1,.detail-table thead th.sticky2,.detail-table thead th.sticky3{text-align:center!important}.summary-table tbody td:not(.label):not(.sticky1):not(.sticky2),.detail-table tbody td:not(.label){text-align:right}
  @media(max-width:900px){.sidebar{width:100%;height:auto;flex-direction:row}.brand{padding:10px 14px}.brand-mark{width:34px;height:34px;flex-basis:34px}.brand-copy{display:none}.nav{display:flex;padding:0;overflow-x:auto}.nav-group-label{display:none}.nav-item,.nav-item.sub{gap:6px;padding:11px 9px;margin:0 2px;font-size:11px;white-space:nowrap;border-radius:9px}.nav-item span{display:inline}.nav-item svg{width:15px}.nav-item.active{border-bottom:3px solid #718AF0}.topbar{min-height:62px;padding:10px 16px}.main{padding:16px}.kpi-card{padding:16px}.card{padding:18px 15px}.chart-wrap{height:220px}}
  @media(max-width:520px){.brand{display:none}.kpi-grid{grid-template-columns:1fr}.as-of:before{display:none}}
</style>
</head>

<script>
(function(){
  "use strict";

  var SUMMARY_URL = "https://docs.google.com/spreadsheets/d/1dAvuc4xukEkAT_p7Seo6-yCaXKZY0fa4Ls9n3h14RIQ/edit?gid=0#gid=0";
  var DETAIL_URL  = "https://docs.google.com/spreadsheets/d/1dAvuc4xukEkAT_p7Seo6-yCaXKZY0fa4Ls9n3h14RIQ/edit?gid=2000332474#gid=2000332474";
  var BALANCE_URL = "https://docs.google.com/spreadsheets/d/1dAvuc4xukEkAT_p7Seo6-yCaXKZY0fa4Ls9n3h14RIQ/edit?gid=1821335135#gid=1821335135";

  var state = { summary: [], detail: [], balance: [] };
  var charts = { balance: null, io: null };

  /* ---------------- URL / fetch helpers ---------------- */

  function toCsvUrl(editUrl){
    var idMatch = editUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
    var gidMatch = editUrl.match(/gid=(\d+)/);
    var id = idMatch ? idMatch[1] : "";
    var gid = gidMatch ? gidMatch[1] : "0";
    return "https://docs.google.com/spreadsheets/d/" + id + "/gviz/tq?tqx=out:csv&gid=" + gid;
  }

  /* ---------------- CSV parser (no external libs) ---------------- */

  function parseCSV(text){
    var rows = [];
    var row = [];
    var field = "";
    var inQuotes = false;
    for (var i = 0; i < text.length; i++){
      var c = text[i];
      if (inQuotes){
        if (c === '"'){
          if (text[i+1] === '"'){ field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else {
        if (c === '"'){ inQuotes = true; }
        else if (c === ','){ row.push(field); field = ""; }
        else if (c === '\r'){ /* skip */ }
        else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ""; }
        else { field += c; }
      }
    }
    if (field.length > 0 || row.length > 0){ row.push(field); rows.push(row); }
    return rows;
  }

  function parseAmount(v){
    if (v === null || v === undefined) return 0;
    var cleaned = String(v).replace(/[",\s]/g, "");
    if (cleaned === "" || cleaned === "-") return 0;
    var n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  }

  function normalizeMonth(raw){
    if (!raw) return null;
    var m = String(raw).match(/(\d{4})\D{0,2}(\d{1,2})/);
    if (!m) return null;
    var year = m[1];
    var month = parseInt(m[2], 10);
    if (month < 1 || month > 12) return null;
    return year + "-" + String(month).padStart(2, "0");
  }

  /* ---------------- Data building ---------------- */

  function buildSummary(rows){
    var out = [];
    for (var i = 1; i < rows.length; i++){
      var row = rows[i];
      if (!row || row.length === 0) continue;
      var month = normalizeMonth(row[0]);
      if (!month) continue;
      var rec = {
        month: month,
        base: parseAmount(row[1]),
        incomeOp: parseAmount(row[2]),
        incomeFin: parseAmount(row[3]),
        incomeEtc: parseAmount(row[4]),
        expOpCost: parseAmount(row[5]),
        expFin: parseAmount(row[6]),
        expInv: parseAmount(row[7]),
        adjust: parseAmount(row[8])
      };
      out.push(rec);
    }
    out.sort(function(a,b){ return a.month < b.month ? -1 : (a.month > b.month ? 1 : 0); });
    out.forEach(function(r){
      r.incomeTotal = r.incomeOp + r.incomeFin + r.incomeEtc;
      r.expenseTotal = r.expInv + r.expFin + r.expOpCost;
      r.netFlow = r.incomeTotal - r.expenseTotal + r.adjust;
      r.endBalance = r.base + r.netFlow;
    });
    return out;
  }

  function buildDetail(rows){
    if (!rows || rows.length === 0) return { monthCols: [], entries: [] };
    var header = rows[0];
    var monthCols = [];
    for (var c = 3; c < header.length; c++){
      var m = normalizeMonth(header[c]);
      if (m) monthCols.push({ index: c, month: m });
    }
    var entries = [];
    for (var i = 1; i < rows.length; i++){
      var row = rows[i];
      if (!row || row.length === 0) continue;
      var g1 = (row[0] || "").trim();
      if (!g1) continue;
      var g2 = (row[1] || "").trim();
      var g3 = (row[2] || "").trim();
      var values = {};
      monthCols.forEach(function(mc){ values[mc.month] = parseAmount(row[mc.index]); });
      entries.push({ group1: g1, group2: g2, group3: g3, values: values });
    }
    return { monthCols: monthCols, entries: entries };
  }

  function buildBalance(rows){
    var out = [];
    for (var i = 1; i < rows.length; i++){
      var row = rows[i];
      if (!row || row.length < 2) continue;
      var dateRaw = (row[0] || "").trim();
      if (!dateRaw) continue;
      out.push({ dateRaw: dateRaw, amount: parseAmount(row[1]) });
    }
    return out;
  }

  /* ---------------- Formatting helpers ---------------- */

  function round1(n){ return Math.round(n * 10) / 10; }

  function fmtEokPlain(won){
    var eok = won / 1e8;
    return eok.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  }

  function fmtEokMainHtml(won){
    return fmtEokPlain(won) + '<span class="unit">억원</span>';
  }

  function fmtSignedEok(won){
    var eok = round1(won / 1e8);
    var sign = eok > 0 ? "+" : (eok < 0 ? "-" : "");
    var absStr = Math.abs(eok).toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    return sign + absStr + "억원";
  }

  function fmtWon(won){
    return Math.round(won).toLocaleString("ko-KR");
  }

  function fmtSignedWon(won){
    var v = Math.round(won);
    var sign = v > 0 ? "+" : (v < 0 ? "-" : "");
    return sign + Math.abs(v).toLocaleString("ko-KR");
  }

  function formatMonthLabel(month){
    var parts = month.split("-");
    return parts[0].slice(2) + "." + parts[1];
  }

  function formatMonthFull(month){
    var parts = month.split("-");
    return parts[0] + "년 " + parseInt(parts[1], 10) + "월";
  }

  function formatAsOfDate(month){
    var parts = month.split("-").map(Number);
    var y = parts[0], m = parts[1];
    var lastDay = new Date(y, m, 0).getDate();
    return y + ". " + String(m).padStart(2,"0") + ". " + String(lastDay).padStart(2,"0");
  }

  function formatDotDate(raw){
    var m = String(raw).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (!m) return String(raw);
    return m[1] + ". " + String(parseInt(m[2],10)).padStart(2,"0") + ". " + String(parseInt(m[3],10)).padStart(2,"0");
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  function renderBarChart(data){
    var ctx = document.getElementById("ioChart").getContext("2d");
    var labels = data.map(function(d){ return formatMonthLabel(d.month); });

    var series = [
      { key: "incomeOp", label: "수입-영업", color: "#3559D9", stack: "income" },
      { key: "incomeFin", label: "수입-재무", color: "#718AF0", stack: "income" },
      { key: "incomeEtc", label: "수입-기타", color: "#BBC7FA", stack: "income" },
      { key: "expOpCost", label: "지출-영업", color: "#C65C45", stack: "expense" },
      { key: "expFin", label: "지출-재무", color: "#E28A70", stack: "expense" },
      { key: "expInv", label: "지출-투자", color: "#F1C4B6", stack: "expense" }
    ];
    var stackTotalLabel = { income: "수입 계", expense: "지출 계" };
    var stackLabelColor = { income: "#3559D9", expense: "#C65C45" };

    var datasets = series.map(function(s, idx){
      var isLastInStack = true;
      for (var j = idx + 1; j < series.length; j++){
        if (series[j].stack === s.stack) { isLastInStack = false; break; }
      }
      var ds = {
        label: s.label,
        stack: s.stack,
        data: data.map(function(d){ return round1(d[s.key] / 1e8); }),
        backgroundColor: s.color,
        borderColor: "#fff",
        borderWidth: 1,
        maxBarThickness: 28
      };
      if (isLastInStack){
        ds.datalabels = {
          display: true,
          color: stackLabelColor[s.stack],
          font: { size: 11, weight: "bold" },
          anchor: "end",
          align: "top",
          formatter: function(value, context){
            var stackId = context.dataset.stack;
            var sum = 0;
            context.chart.data.datasets.forEach(function(d){
              if (d.stack === stackId) sum += d.data[context.dataIndex];
            });
            return round1(sum).toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
          }
        };
      } else {
        ds.datalabels = { display: false };
      }
      return ds;
    });

    if (charts.io) charts.io.destroy();
    charts.io = new Chart(ctx, {
      type: "bar",
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "nearest", intersect: true },
        plugins: {
          legend: {
            display: true,
            position: "top",
            align: "end",
            labels: { usePointStyle: true, pointStyle: "circle", boxWidth: 8, boxHeight: 8, color: "#4B5768", font: { size: 12 } }
          },
          tooltip: {
            backgroundColor: "#16293F",
            cornerRadius: 8,
            padding: 10,
            titleFont: { size: 12 },
            bodyFont: { size: 12.5 },
            footerFont: { size: 11.5, weight: "normal" },
            callbacks: {
              label: function(ctx){
                var v = ctx.parsed.y.toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                return ctx.dataset.label + " " + v + "억원";
              },
              footer: function(items){
                var item = items[0];
                var stackId = item.dataset.stack;
                var sum = 0;
                item.chart.data.datasets.forEach(function(ds){
                  if (ds.stack === stackId) sum += ds.data[item.dataIndex];
                });
                var v = round1(sum).toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
                return stackTotalLabel[stackId] + " " + v + "억원";
              }
            }
          }
        },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { color: "#7C8898", font: { size: 11.5 } } },
          y: { stacked: true, grace: "12%", grid: { color: "#EEF1F5" }, ticks: { color: "#7C8898", font: { size: 11.5 }, callback: function(v){ return v + "억"; } } }
        }
      }
    });
  }

  function monthCells(monthMap, field, numClass, noTotal){
    var cells = "";
    var sum = 0;
    var any = false;
    for (var m = 1; m <= 12; m++){
      var key = String(m).padStart(2, "0");
      var rec = monthMap[key];
      if (rec){
        var val = rec[field];
        cells += '<td class="' + (numClass || "") + '">' + fmtEokPlain(val) + "</td>";
        sum += val;
        any = true;
      } else {
        cells += "<td>-</td>";
      }
    }
    var totalCell = noTotal ? '<td class="total-col">-</td>' : ('<td class="total-col">' + (any ? fmtEokPlain(sum) : "-") + "</td>");
    return cells + totalCell;
  }

  /* ---------------- Detail page (page 3) ---------------- */

  var DETAIL_HIER_GROUPS = { "수입": true, "지출": true };

  function groupByOrder(list, keyFn){
    var order = []; var map = {};
    list.forEach(function(item){
      var k = keyFn(item);
      if (!map[k]) { map[k] = []; order.push(k); }
      map[k].push(item);
    });
    return order.map(function(k){ return { key: k, items: map[k] }; });
  }

  function buildDetailRenderRows(entries, prevMonth, curMonth){
    var g1Buckets = groupByOrder(entries, function(e){ return e.group1; });
    var rows = [];

    g1Buckets.forEach(function(bucket){
      var g1 = bucket.key;
      if (DETAIL_HIER_GROUPS[g1]){
        var g2Buckets = groupByOrder(bucket.items, function(e){ return e.group2; });
        var totalPrev = 0, totalCur = 0, totalHasPrev = false, totalHasCur = false;
        g2Buckets.forEach(function(g2b){
          var subPrev = 0, subCur = 0, subHasPrev = false, subHasCur = false;
          g2b.items.forEach(function(e){
            var prevVal = prevMonth ? e.values[prevMonth] : undefined;
            var curVal = e.values[curMonth];
            rows.push({ rowType: "item", group1: g1, group2: g2b.key, item: e.group3, prev: prevVal, cur: curVal });
            if (prevVal !== undefined) { subPrev += prevVal; subHasPrev = true; }
            if (curVal !== undefined) { subCur += curVal; subHasCur = true; }
          });
          rows.push({
            rowType: "subtotal", group1: g1, group2: g2b.key, item: g2b.key + " 소계",
            prev: subHasPrev ? subPrev : undefined, cur: subHasCur ? subCur : undefined
          });
          if (subHasPrev) { totalPrev += subPrev; totalHasPrev = true; }
          if (subHasCur) { totalCur += subCur; totalHasCur = true; }
        });
        rows.push({
          rowType: "total", group1: g1, group2: null, item: g1 + " 총계",
          prev: totalHasPrev ? totalPrev : undefined, cur: totalHasCur ? totalCur : undefined
        });
      } else {
        bucket.items.forEach(function(e){
          var prevVal = prevMonth ? e.values[prevMonth] : undefined;
          var curVal = e.values[curMonth];
          var row = { rowType: "flat", group1: g1, group2: null, item: e.group3 || g1, prev: prevVal, cur: curVal };
          if (g1 === "기초잔액" || g1 === "기말잔액"){
            row.group1Display = "";
            row.group2 = null;
            row.item = g1;
          }
          rows.push(row);
        });
      }
    });

    for (var i = 0; i < rows.length; i++){
      if (rows[i].g1Span !== undefined) continue;
      var j = i + 1;
      while (j < rows.length && rows[j].group1 === rows[i].group1) j++;
      rows[i].g1Span = j - i;
      for (var k = i + 1; k < j; k++) rows[k].g1Span = 0;
    }
    for (var i2 = 0; i2 < rows.length; i2++){
      if (rows[i2].rowType !== "item" && rows[i2].rowType !== "subtotal") continue;
      if (rows[i2].g2Span !== undefined) continue;
      var j2 = i2 + 1;
      while (j2 < rows.length && (rows[j2].rowType === "item" || rows[j2].rowType === "subtotal") && rows[j2].group2 === rows[i2].group2) j2++;
      rows[i2].g2Span = j2 - i2;
      for (var k2 = i2 + 1; k2 < j2; k2++) rows[k2].g2Span = 0;
    }
    return rows;
  }

  function renderDetailRow(r){
    var trClass = "row-" + r.rowType;
    if (r.rowType === "total" && r.group1 === "지출") trClass += " expense-total";
    if (r.rowType === "flat" && r.group1 === "기초잔액") trClass += " row-flat-base";
    if (r.rowType === "flat" && r.group1 === "기말잔액") trClass += " row-flat-end";

    var numClass = "";
    if (r.rowType === "item" || r.rowType === "subtotal"){
      if (r.group1 === "수입") numClass = "num-income";
      else if (r.group1 === "지출") numClass = "num-expense";
    }

    var g1Text = r.group1Display !== undefined ? r.group1Display : r.group1;
    var g1Class = "label sticky1" + ((g1Text === "수입" || g1Text === "지출" || g1Text === "조정") ? " g1-strong" : "");
    var g1Cell = r.g1Span === 0 ? "" : ('<td class="' + g1Class + '"' + (r.g1Span > 1 ? ' rowspan="' + r.g1Span + '"' : "") + '>' + escapeHtml(g1Text) + "</td>");
    var g2Cell;
    if (r.rowType === "item" || r.rowType === "subtotal"){
      g2Cell = r.g2Span === 0 ? "" : ('<td class="label sticky2"' + (r.g2Span > 1 ? ' rowspan="' + r.g2Span + '"' : "") + '>' + escapeHtml(r.group2) + "</td>");
    } else {
      g2Cell = '<td class="label sticky2">' + (r.group2 ? escapeHtml(r.group2) : "") + "</td>";
    }

    var prevStr = r.prev === undefined ? "-" : fmtWon(r.prev);
    var curStr = r.cur === undefined ? "-" : fmtWon(r.cur);
    var diffStr = "-", pctStr = "-";
    if (r.prev !== undefined && r.cur !== undefined){
      var diff = r.cur - r.prev;
      diffStr = fmtSignedWon(diff);
      pctStr = r.prev !== 0 ? (round1((diff / Math.abs(r.prev)) * 100).toLocaleString("ko-KR", { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + "%") : "-";
    }

    return '<tr class="' + trClass + '">' +
      g1Cell + g2Cell +
      '<td class="label sticky3">' + escapeHtml(r.item) + "</td>" +
      '<td class="' + numClass + '">' + prevStr + "</td>" +
      '<td class="' + numClass + '">' + curStr + "</td>" +
      '<td class="' + numClass + '">' + diffStr + "</td>" +
      "<td>" + pctStr + "</td>" +
      "</tr>";
  }

  function buildDetailHead(prevMonth, curMonth){
    var thead = document.querySelector("#detailTable thead");
    var prevLabel = prevMonth ? ("전월 (" + prevMonth + ")") : "전월";
    var curLabel = "당월 (" + curMonth + ")";

      "<th>" + curLabel + "</th>" +
      "<th>증감액</th>" +
      "<th>증감률</th>" +
      "</tr>";
  }

  function renderDetailTable(month){

    for (var i = 0; i < monthCols.length; i++){ if (monthCols[i].month === month){ idx = i; break; } }

  function loadAll(){
    var summaryReq = fetch(toCsvUrl(SUMMARY_URL) + "&t=" + Date.now()).then(function(r){
      if (!r.ok) throw new Error("summary fetch failed");
      return r.text();
    });
    var detailReq = fetch(toCsvUrl(DETAIL_URL) + "&t=" + Date.now()).then(function(r){
      if (!r.ok) throw new Error("detail fetch failed");
      return r.text();
    });
    var balanceReq = fetch(toCsvUrl(BALANCE_URL) + "&t=" + Date.now()).then(function(r){
      if (!r.ok) throw new Error("balance fetch failed");
      return r.text();
    });

    Promise.all([summaryReq, detailReq, balanceReq]).then(function(results){
      var summaryRows = parseCSV(results[0]);
      var detailRows = parseCSV(results[1]);
      var balanceRows = parseCSV(results[2]);
      state.summary = buildSummary(summaryRows);
      state.detail = buildDetail(detailRows);
      state.balance = buildBalance(balanceRows);
      if (state.summary.length === 0) throw new Error("no summary data");
      initApp();
    }).catch(function(err){
      console.error(err);
      showLoadError();
    });
  }

  if (window.lucide) window.lucide.createIcons();
  loadAll();
})();
</script>
</body>
</html>
